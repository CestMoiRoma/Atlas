name: CI

on:
  push:
    branches: ["DEV_AtlasV0.1", "main"]
  pull_request:
    branches: ["DEV_AtlasV0.1", "main"]

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Run ruff check
        run: ruff check atlas/ tests/ scripts/

      - name: Run ruff format check
        run: ruff format --check atlas/ tests/ scripts/

  test:
    name: Unit tests (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    needs: lint

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('pyproject.toml') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-

      - name: Install package + dev deps
        run: |
          pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run unit tests
        env:
          # Minimal env so Config.from_env() doesn't raise in tests that
          # don't patch os.environ (tests use patch.dict — this is a safety net)
          ATLAS_VAULT_PATH: /tmp/vault
          WHISPER_MODEL_PATH: /tmp/model.bin
          WAKE_WORD_MODEL_PATHS: /tmp/Atlas.onnx
          OLLAMA_HOST: http://localhost:11434
          OLLAMA_MODEL: llama3.2
          CLAUDE_API_KEY: ""
        run: |
          pytest tests/unit/ -v --tb=short
